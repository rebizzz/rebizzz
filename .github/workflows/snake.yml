name: generate snake

on:
  schedule:
    # runs every 12 hours
    - cron: "0 */12 * * *"
  # run manually from the Actions tab
  workflow_dispatch:
  # regenerate on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#cba6f7&color_dots=#1e1e2e,#45475a,#89b4fa,#cba6f7,#fab387

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
